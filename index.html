<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoTech Solutions | Tecnologia Sustentável</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="navbar" aria-label="Navegação Principal">
            <div class="logo">EcoTech</div>
            <div class="a11y-controls">
                <button id="btn-contrast" aria-label="Alternar Alto Contraste">🌓</button>
                <button id="font-up" aria-label="Aumentar Fonte">A+</button>
                <button id="font-down" aria-label="Diminuir Fonte">A-</button>
            </div>
        </nav>
    </header>

    <main>
        <section class="hero" aria-labelledby="hero-title">
            <h1 id="hero-title">Inovação verde para um futuro digital.</h1>
            <p>Soluções inteligentes que respeitam o planeta.</p>
        </section>

        <section id="services" class="reveal" aria-labelledby="services-title">
            <h2 id="services-title">Nossos Serviços</h2>
            <div class="grid-container" id="services-grid">
                </div>
        </section>

        <section class="reveal" aria-labelledby="faq-title">
            <h2 id="faq-title">Dúvidas Frequentes</h2>
            <div id="faq-container" class="accordion">
                </div>
        </section>

        <section class="reveal" aria-label="Depoimentos de clientes">
            <div class="carousel" id="carousel">
                <div class="carousel-track" id="carousel-track">
                    </div>
                <div class="carousel-nav">
                    <button id="prev" aria-label="Slide anterior">❮</button>
                    <button id="next" aria-label="Próximo slide">❯</button>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <p>&copy; 2024 EcoTech Solutions. Acessibilidade em primeiro lugar.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
